services:
  s3:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: s3admin
      MINIO_ROOT_PASSWORD: s3admin1
    command: server /data --console-address ":9001"
    volumes:
      - s3_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:latest
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: media_conversion
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5

  create_bucket:
    image: minio/mc:latest
    depends_on:
      s3:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      until (/usr/bin/mc alias set myminio http://s3:9000 s3admin s3admin1) do echo 'Waiting for MinIO...' && sleep 2; done;
      /usr/bin/mc mb myminio/conversions --ignore-existing;
      echo 'Bucket conversions created or already exists';
      "

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    expose:
      - "8080"  
    environment:
      # PostgreSQL
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/media_conversion
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      # S3 (MinIO)
      AWS_S3_ENDPOINT: http://s3:9000
      AWS_S3_BUCKET: conversions
      AWS_S3_ACCESS_KEY: s3admin
      AWS_S3_SECRET_KEY: s3admin1
      AWS_S3_PATH_STYLE_ACCESS: "true"
    depends_on:
      postgres:
        condition: service_healthy
      s3:
        condition: service_healthy
      create_bucket:
        condition: service_completed_successfully

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    expose:
      - "80" 

  caddy:
    image: caddy:2.11.1
    ports: 
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
      - ./static:/var/www/static
    depends_on:
      - backend
      - frontend

volumes:
  s3_data:
  postgres_data:
  caddy_data:
  caddy_config:

